<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>UMCSSA 活动签到</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Noto Sans SC", sans-serif;
      color: #1f2937;
      background:
        linear-gradient(rgba(255,255,255,0.94), rgba(255,255,255,0.94)),
        repeating-linear-gradient(0deg, #fee2e2 0, #fee2e2 1px, transparent 1px, transparent 32px),
        repeating-linear-gradient(90deg, #fee2e2 0, #fee2e2 1px, transparent 1px, transparent 32px);
    }

    .navbar {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 72px;
      background: rgba(255,255,255,0.85);
      border-bottom: 1px solid #e5e7eb;
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 700;
      text-decoration: none;
      color: #b91c1c;
    }

    .logo img {
      height: 42px;
      width: auto;
    }

    .nav a {
      margin-left: 48px;
      text-decoration: none;
      color: #6b7280;
      font-size: 15px;
    }

    .nav a:hover,
    .nav a.active {
      color: #b91c1c;
      font-weight: 600;
    }

    .page {
      min-height: calc(100vh - 72px);
      padding: 100px 18%;
      position: relative;
    }

    .label {
      font-size: 14px;
      letter-spacing: 2px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .title {
      font-size: 48px;
      line-height: 1.35;
      font-weight: 300;
      letter-spacing: 6px;
      background: linear-gradient(90deg, #991b1b, #ef4444, #fca5a5);
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 56px;
    }

    .event-section {
      max-width: 820px;
    }

    .event-section h2 {
      margin: 36px 0 18px;
      font-size: 22px;
      color: #991b1b;
    }

    .event-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 28px;
      margin-bottom: 18px;
      border-radius: 18px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid #f3d1d1;
      box-shadow: 0 16px 40px rgba(185, 28, 28, 0.08);
    }

    .active-card {
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .active-card:hover {
      transform: translateY(-3px);
      border-color: #b91c1c;
      box-shadow: 0 22px 56px rgba(185, 28, 28, 0.14);
    }

    .disabled-card {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .event-name {
      font-size: 18px;
      font-weight: 700;
      color: #1f2937;
    }

    .event-desc {
      margin-top: 8px;
      font-size: 14px;
      color: #6b7280;
    }

    .event-status {
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: #fee2e2;
      color: #991b1b;
    }

    .side-text {
      position: fixed;
      right: 36px;
      top: 120px;
      writing-mode: vertical-rl;
      font-size: 56px;
      font-weight: 800;
      color: rgba(185, 28, 28, 0.08);
      letter-spacing: 4px;
    }

    .left-bar {
      position: fixed;
      left: 76px;
      top: 320px;
      width: 18px;
      height: 240px;
      background: #b91c1c;
    }
  </style>
</head>

<body>
  <header class="navbar">
    <a class="logo" href="index.html">
      <img src="assets/umcssa_logo.png" alt="UMCSSA Logo">
      <span>UMCSSA Platform</span>
    </a>

    <nav class="nav">
      <a class="active" href="event_index.html">活动签到</a>
      <a href="#">接机申请</a>
    </nav>
  </header>

  <div class="side-text">EVENTS</div>
  <div class="left-bar"></div>

  <main class="page">
    <div class="label">EVENT CHECK-IN</div>

    <h1 class="title">
      请选择活动<br />
      进入签到界面
    </h1>

    <section class="event-section">
      <h2>当前活动</h2>

      <a class="event-card active-card" href="checkin.html?event=beijing">
        <div>
          <div class="event-name">2026 年新生见面会（北京场）</div>
          <div class="event-desc">点击进入北京场签到界面</div>
        </div>
        <span class="event-status">开放中</span>
      </a>

      <h2>未来活动</h2>

      <div class="event-card disabled-card">
        <div>
          <div class="event-name">2026 年新生见面会（深圳场）</div>
          <div class="event-desc">暂未开放</div>
        </div>
        <span class="event-status">未开放</span>
      </div>

      <div class="event-card disabled-card">
        <div>
          <div class="event-name">2027 年春节迎新晚会</div>
          <div class="event-desc">暂未开放</div>
        </div>
        <span class="event-status">未开放</span>
      </div>
    </section>
  </main>
</body>
</html>
